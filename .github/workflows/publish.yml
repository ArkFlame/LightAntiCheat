name: Publish package to GitHub Packages
on: push
jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: Publish package
        run: mvn -B -ntp deploy
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
